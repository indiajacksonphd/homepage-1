<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy | Dr. India Jackson</title>

  <link href="https://fonts.googleapis.com/css2?family=Bungee+Hairline&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Bungee Hairline", sans-serif;
      line-height: 1.4;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 70px;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.75);
      margin-bottom: 42px;
      font-size: 1rem;
    }

    .policy-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
      grid-auto-rows: 110px;
    }

    .policy-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    .policy-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06);
    }

    .policy-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .policy-text {
      padding: 20px 20px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .policy-text h2,
    .policy-text h3,
    .policy-text p {
      margin: 0;
      font-weight: 400;
      color: #fff;
    }

    .policy-text h2 {
      font-size: 2rem;
      line-height: 1.15;
    }

    .policy-text h3 {
      font-size: 1.7rem;
      line-height: 1.15;
    }

    .policy-text p {
      font-size: 1.9rem;
      line-height: 1.2;
    }

    .small-text p {
      font-size: 1.25rem;
      line-height: 1.3;
    }

    h3 {
  text-align: center;
  font-size: 1.1rem;
  letter-spacing: 4px;
  margin: 0 0 28px 0;
}

.policy-grid {
  max-width: 920px;
  margin: 0 auto;
}

.policy-card {
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 22px;
}

.policy-card img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 520px;
  object-fit: cover;
  transition: transform 0.18s ease;
}

.image-card:hover img {
  transform: scale(1.015);
}


    /* Layout */
    .img-1   { grid-column: 1 / span 5;  grid-row: 1 / span 2; }
    .text-1  { grid-column: 6 / span 7;  grid-row: 1 / span 2; }

    .text-2  { grid-column: 1 / span 5;  grid-row: 3 / span 2; }
    .img-2   { grid-column: 6 / span 4;  grid-row: 3 / span 2; }

    .img-3   { grid-column: 1 / span 3;  grid-row: 5 / span 3; }
    .text-3  { grid-column: 4 / span 4;  grid-row: 5 / span 1; }

    .text-4  { grid-column: 1 / span 5;  grid-row: 8 / span 1; }
    .img-4   { grid-column: 6 / span 4;  grid-row: 8 / span 3; }

    @media (max-width: 900px) {
      .policy-grid {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
      }

      .img-1, .text-1, .text-2, .img-2, .img-3, .text-3, .text-4, .img-4 {
        grid-column: auto;
        grid-row: auto;
      }

      .policy-card {
        min-height: 220px;
      }

      .policy-text {
        min-height: 140px;
      }

      .policy-text h2 {
        font-size: 1.6rem;
      }

      .policy-text h3 {
        font-size: 1.4rem;
      }

      .policy-text p {
        font-size: 1.3rem;
      }

      .small-text p {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h3>Public Engagement</h3>

    <section class="policy-grid">

      <div class="policy-card img-1">
        <img src="images/heliophysics_missions_removed.jpg" alt="Heliophysics missions threatened to be shut down">
      </div>

      <h3>Dragon Con</h3>
      Dragon Con is the largest multi-media, popular culture convention focusing on science fiction & fantasy, gaming, comics, literature, art, music, and film in the universe.

      <div class="policy-card img-2">
        <img src="images/dragon_con_1.jpeg">
      </div>

      <div class="policy-card img-4">
        <img src="images/dragon_con_3.jpeg">
      </div>

      <div class="policy-card img-4">
        <img src="images/dragon_con_2.jpg">
      </div>

      <h3>Astronomy Day</h3>
      I need to describe the program that I created

      <div class="policy-card img-2">
        <img src="images/astronomy_day_1.jpg">
      </div>

      <div class="policy-card img-4">
        <img src="images/astronomy_day_2.jpg">
      </div>

      <div class="policy-card img-4">
        <img src="images/astronomy_day_3.png">
      </div>

      <div class="policy-card img-4">
        <img src="images/astronomy_day_4.jpeg">
      </div>

    </section>
  </div>
</body>
</html>
